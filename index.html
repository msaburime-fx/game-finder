<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game Finder</title>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }
        
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #5b3636;
      min-height: 100vh;
      display: flex;
      caret-color: transparent;
      justify-content: center;  
      align-items: center;      
    }
        
    ::selection {
      background: #8c8c8c;  
      color: #5b3636;         
    }
        
    ::moz-selection {
      background: #2e2828;
      color: #5b3636;
    }
        
    .container > * {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.8s ease forwards;
      width: 100%;
      max-width: 980px;
      align-items: center;  
    }

    .container > *:nth-child(1) { animation-delay: 0.1s; }
    .container > *:nth-child(2) { animation-delay: 0.2s; }
    .container > *:nth-child(3) { animation-delay: 0.3s; }
    .container > *:nth-child(4) { animation-delay: 0.4s; }
    .container > *:nth-child(5) { animation-delay: 0.5s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    body.home-page {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #301b1b;
    }

    body.results-page {
      justify-content: center;
      align-items: center;
      background-color: #e0e1d5;
    }

    .container {
      width: 100%;
      max-width: 980px;
      padding: 166px 16px;
      margin: 0 auto;
    }
        
    button {
      background-color: #8b5e5e;
      color: white;
      border: none;
      padding: 10px 18px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background-color: transparent;
      color: #8b5e5e;
      transform: translateY(-2px);
    }

    .split {
      display: flex;
      gap: 0px;
      justify-content: space-between;
      align-items: center;
    }

    .left-pane, .right-pane { width: 50%; }
    .left-pane { text-align: center; }

    .hero-img {
      width: 100%;
      max-width: 420px;
      margin: 0px auto;
      cursor: pointer;
      display: block;
    }

    .paper-text {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      background-image: url("https://image2url.com/r2/default/files/1770909023927-76cf5602-ae0a-4fc9-afd1-2bb3930cd770.png");
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
      text-align: left;
      font-size: 17px;
      padding: 70px 30px 60px 60px; 
    }
        
    @media (min-width: 450px) {
      .paper-text { padding: 70px 50px 80px 120px; }
    }

    @media (min-width: 768px) {
      .paper-text { padding: 70px 50px 80px 100px; }
    }

    @media (min-width: 1024px) {
      .paper-text {
        padding: 90px 30px 100px 100px;
        font-size: 18px;
      }
    }

    .right-pane { text-align: left; }

    .row {
      margin: 2px;
      padding: 0px;
      line-height: 2.4;
      letter-spacing: -.5px;
      text-transform: lowercase;
    }

    select {
      padding: 4px 6px;
      margin: 0px 10px;
      font-size: 13px;
      text-align: center;
      letter-spacing: 0.3px;
      color: #5b3636;
    }

    .btn {
      margin: 5px 3px;
      padding: 8px 14px;
      background-color: #dae679;
      color: #5b3636;
      border: 1px solid #5b3636;
      border-radius: 20px;
      font-size: 14px;
      letter-spacing: 0.5px;
      text-transform: lowercase;
      cursor: pointer;
    }

    .btn-clear {
      margin: 5px 3px;
      padding: 8px 14px;
      background-color: #eaeaea;
      color: #5b3636;
      border: 1px solid #5b3636;
      border-radius: 20px;
      font-size: 14px;
      letter-spacing: 0.5px;
      text-transform: lowercase;
      cursor: pointer;
    }

    .btn-rand {
      margin: 5px 3px;
      padding: 8px 14px;
      background-color: #b8e2f1;
      color: #5b3636;
      border: 1px solid #5b3636;
      border-radius: 20px;
      font-size: 14px;
      letter-spacing: 0.5px;
      text-transform: lowercase;
      cursor: pointer;
    }

    .btn-all {
      margin: 5px 3px;
      padding: 8px 14px;
      background-color: #caf1b8;
      color: #5b3636;
      border: 1px solid #5b3636;
      border-radius: 20px;
      font-size: 14px;
      letter-spacing: 0.5px;
      text-transform: lowercase;
      cursor: pointer;
    }

    #resultsPage {
      text-align: center;
      padding-top: 10px;
    }

    .results-header {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 18px 0 6px;
    }

    .results-header-img {
      width: min(520px, 92vw);
      height: auto;
      display: block;
    }

    .results-subtitle {
      font-size: 20px;
      letter-spacing: 0.6px;
      margin: 4px 0 16px;
      opacity: 0.9;
      text-transform: lowercase;
      display: none;
    }

    .results-list {
      display: grid;
      gap: 20px;
      justify-items: center;
      margin: 30px auto;
      padding: 0px 30px;
    }

    .game-block {
      width: 100%;
      max-width: 800px;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 20px;
      align-items: center;
      background: rgba(255, 255, 255, 0.70);
      border: 1px solid rgba(91, 54, 54, 0.7);
      border-radius: 22px;
      padding: 20px;
    }

    .game-photo {
      width: 180px;
      height: 120px;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(91, 54, 54, 0.35);
      border-radius: 14px;
      padding: 8px;
    }

    .g-mid {
      text-align: left;
    }
