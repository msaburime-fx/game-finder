<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game Finder</title>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }
        
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #5b3636;
      min-height: 100vh;
      display: flex;
      caret-color: transparent;
      justify-content: center;  
      align-items: center;      
    }
        
    ::selection {
      background: #8c8c8c;  
      color: #5b3636;         
    }
        
    ::moz-selection {
      background: #2e2828;
      color: #5b3636;
    }
        
    .container > * {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.8s ease forwards;
      width: 100%;
      max-width: 980px;   
      align-items: center;  
    }

    .container > *:nth-child(1) { animation-delay: 0.1s; }
    .container > *:nth-child(2) { animation-delay: 0.2s; }
    .container > *:nth-child(3) { animation-delay: 0.3s; }
    .container > *:nth-child(4) { animation-delay: 0.4s; }
    .container > *:nth-child(5) { animation-delay: 0.5s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    body.home-page {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #301b1b;
    }

    body.results-page {
      justify-content: center;
      align-items: center;
      background-color: #e0e1d5;
    }

    .container {
      width: 100%;
      max-width: 980px;
      padding: 16px;
      margin: 0 auto;
    }
        
    button {
      background-color: #8b5e5e;
      color: white;
      border: none;
      padding: 10px 18px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background-color: transparent;
      color: #8b5e5e;
      transform: translateY(-2px);
    }

    .split {
      display: flex;
      gap: 0px;
      justify-content: space-between;
      align-items: center;
    }

    .left-pane, .right-pane { width: 50%; }
    .left-pane { text-align: center; }

    .hero-img {
      width: 100%;
      max-width: 420px;
      margin: 0px auto;
      cursor: pointer;
      display: block;
    }

    .paper-text {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      background-image: url("https://image2url.com/r2/default/files/1770909023927-76cf5602-ae0a-4fc9-afd1-2bb3930cd770.png");
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
      text-align: left;
      font-size: 17px;
      padding: 70px 30px 60px 60px; 
    }
        
    @media (min-width: 450px) {
      .paper-text { padding: 70px 50px 80px 120px; }
    }

    @media (min-width: 768px) {
      .paper-text { padding: 70px 50px 80px 100px; }
    }

    @media (min-width: 1024px) {
      .paper-text {
        padding: 90px 30px 100px 100px;
        font-size: 18px;
      }
    }

    .right-pane { text-align: left; }

    .row {
      margin: 2px;
      padding: 0px;
      line-height: 2.4;
      letter-spacing: -.5px;
      text-transform: lowercase;
    }

    select {
      padding: 4px 6px;
      margin: 0px 10px;
      font-size: 13px;
      text-align: center;
      letter-spacing: 0.3px;
      color: #5b3636;
    }

    .btn {
      margin: 5px 3px;
      padding: 8px 14px;
      background-color: #dae679;
      color: #5b3636;
      border: 1px solid #5b3636;
      border-radius: 20px;
      font-size: 14px;
      letter-spacing: 0.5px;
      text-transform: lowercase;
      cursor: pointer;
    }

    .btn-clear {
      margin: 5px 3px;
      padding: 8px 14px;
      background-color: #eaeaea;
      color: #5b3636;
      border: 1px solid #5b3636;
      border-radius: 20px;
      font-size: 14px;
      letter-spacing: 0.5px;
      text-transform: lowercase;
      cursor: pointer;
    }

    .btn-rand {
      margin: 5px 3px;
      padding: 8px 14px;
      background-color: #b8e2f1;
      color: #5b3636;
      border: 1px solid #5b3636;
      border-radius: 20px;
      font-size: 14px;
      letter-spacing: 0.5px;
      text-transform: lowercase;
      cursor: pointer;
    }

    .btn-all {
      margin: 5px 3px;
      padding: 8px 14px;
      background-color: #caf1b8;
      color: #5b3636;
      border: 1px solid #5b3636;
      border-radius: 20px;
      font-size: 14px;
      letter-spacing: 0.5px;
      text-transform: lowercase;
      cursor: pointer;
    }

    #resultsPage {
      text-align: center;
      padding-top: 10px;
    }

    .results-header {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 18px 0 6px;
    }

    .results-header-img {
      width: min(520px, 92vw);
      height: auto;
      display: block;
    }

    .results-subtitle {
      font-size: 20px;
      letter-spacing: 0.6px;
      margin: 4px 0 16px;
      opacity: 0.9;
      text-transform: lowercase;
      display: none;
    }

    .results-list {
      display: grid;
      gap: 20px;
      justify-items: center;
      margin: 30px auto;
      padding: 0px 30px;
    }

    .game-block {
      width: 100%;
      max-width: 800px;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 20px;
      align-items: center;
      background: rgba(255, 255, 255, 0.70);
      border: 1px solid rgba(91, 54, 54, 0.7);
      border-radius: 22px;
      padding: 20px;
    }

    .game-photo {
      width: 180px;
      height: 120px;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(91, 54, 54, 0.35);
      border-radius: 14px;
      padding: 8px;
    }

    .g-mid {
      text-align: left;
    }

    .title {
      font-family: "Times New Roman", serif;
      font-size: 35px;
      font-style: italic;
      font-weight: 500;
      margin: 0 0 6px;
      line-height: 0.9;
      letter-spacing: -1px;
      padding: 0px 20px;
    }

    .desc {
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
      max-width: 46ch;
      padding: 0px 20px;
    }

    .g-right {
      display: flex;
      flex-wrap: wrap;
      font-size: 13px; 
      opacity: 80%;
      padding: 0px 20px;
      gap: 8px;
      color: #5b3636;
      font-weight: bold;
    }

    .tag {
      background: rgba(91, 54, 54, 0.1);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
    }

    .results-actions {
      margin: 18px 0 6px;
      display: flex;
      justify-content: center;
    }

    @media (max-width: 820px) {
      .split { flex-direction: column; }
      .left-pane, .right-pane { width: 100%; }
      .game-block { grid-template-columns: 160px 1fr; }
      .game-photo { width: 160px; height: 120px; }
      .title { font-size: 36px; }
    }

    @media (max-width: 520px) {
      .game-block { grid-template-columns: 1fr; text-align: center; }
      .game-photo { margin: 0 auto; }
      .g-mid { text-align: center; }
      .title { font-size: 34px; }
      .desc { margin: 0 auto; }
    }
  </style>
</head>

      <div id="results" class="results-list"></div>

      <div class="results-actions">
        <button type="button" class="btn" onclick="goBack()">Back to Home</button>
      </div>
    </div>

  const energyLabels = { low: "low energy", medium: "creative", high: "high focus" };

  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function matchesFilters(game) {
    const selPlayers = document.getElementById("players").value;
    const selEnv = document.getElementById("environment").value;
    const selEnergy = document.getElementById("energy").value;
    const selCost = document.getElementById("cost").value;

    if (selPlayers) {
      const n = Number(selPlayers);
      if (game.minPlayers > n || game.maxPlayers < n) return false;
    }

    if (selEnv && !game.environments.includes(selEnv)) return false;
    if (selEnergy && !game.energies.includes(selEnergy)) return false;
    if (selCost && !game.costs.includes(selCost)) return false;

    return true;
  }

    }

              <br>
              <div class="g-right">
                <span class="tag">squad fit: ${g.minPlayers}–${g.maxPlayers >= 10 ? "10+" : g.maxPlayers}</span>
                <span class="tag">#${g.environments.join(' #')}</span>
                <span class="tag">#${cleanEnergies}</span>
                <span class="tag">#${g.costs.join(' #')}</span>
              </div>
            </div>
          </div>
        `;
      });
    }

    document.getElementById("searchPage").style.display = "none";
    document.getElementById("resultsPage").style.display = "block";
    setTimeout(() => window.scrollTo(0, 0), 0);
  }

  function searchGames() {
    const filtered = games.filter(matchesFilters);
    const shuffled = shuffleArray([...filtered]);
    showResults(shuffled, "Matched Results", "https://i.imgur.com/aZxq2ew.png");
  }

  function randomGame() {
    const shuffled = shuffleArray([...games]);
    showResults(shuffled.slice(0, 3), "Feeling Random", "https://i.imgur.com/ktBHxKG.png");
  }

  function showAllOwned() {
    const myListOnly = games.filter(g => g.isMyList === true);
    const shuffledCustom = shuffleArray([...myListOnly]);
    showResults(shuffledCustom, "All Custom Activities", "https://i.imgur.com/cHjS0yP.png");
  }

  function goBack() {
    document.body.classList.remove("results-page");
    document.body.classList.add("home-page");
    document.getElementById("resultsPage").style.display = "none";
    document.getElementById("searchPage").style.display = "block";
    setTimeout(() => window.scrollTo(0, 0), 0);
  }
</script>

</body>
</html>
